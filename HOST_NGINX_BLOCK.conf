# RetroRisk — add this server block to your host Nginx config
# alongside your existing artemis.retrobytecybersecurity.org block
#
# Prereqs before adding this:
#   1. Grey cloud A record in Cloudflare for retrorisk.retrobytecybersecurity.org
#   2. sudo certbot --nginx -d retrorisk.retrobytecybersecurity.org
#   3. docker compose up -d (RetroRisk stack running on 127.0.0.1:8080)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name retrorisk.retrobytecybersecurity.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — terminates TLS, proxies to RetroRisk Docker stack on port 8080
server {
    listen 443 ssl http2;
    server_name retrorisk.retrobytecybersecurity.org;

    ssl_certificate /etc/letsencrypt/live/retrorisk.retrobytecybersecurity.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/retrorisk.retrobytecybersecurity.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
